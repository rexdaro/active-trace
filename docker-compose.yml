version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: active_trace
    ports:
      - "5432:5432"
  worker:
    build: .
    command: python -m app.workers.main
    depends_on:
      - db
